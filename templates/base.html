<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="{{ get_url(path="images/icon4.png") | safe }}?v=0">
    <link rel="stylesheet" href="{{ get_url(path='styles/style.css') }}">
    <link rel="stylesheet" href="{{ get_url(path='styles/tag_filter.css') }}">

    {% set pageType = page | default(value=section) %}
    {% if pageType.extra.colors %}
    <style>
        :root {
            {% for key, value in pageType.extra.colors %}
                --{{ key | replace(from="_", to="-") }}: {{ value }};
            {% endfor %}
        }
    </style>
    {% endif %}
    <title>
        {% block title %}
        OmegaFalcon
        {% endblock title %}
    </title>
</head>

<body>
    <section class="section">
        <div class="container">
            {% block content %}
            {% endblock content %}
        </div>
    </section>
</body>
